theme = "vesper"

[editor]
line-number = "relative"
cursorline = true
bufferline = "multiple"
true-color = true
shell = ["zsh", "-c"]

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.statusline]
left = ["mode", "spacer", "version-control", "file-name", "file-modification-indicator"]
right = ["diagnostics", "selections", "register", "position"] 

[editor.indent-guides]
render = true

[keys.normal]
"C-h" = "jump_view_left"
"C-j" = "jump_view_down"
"C-k" = "jump_view_up"
"C-l" = "jump_view_right"
"C-S-h" = "swap_view_left"
"C-S-j" = "swap_view_down"
"C-S-k" = "swap_view_up"
"C-S-l" = "swap_view_right"

[keys.insert]
"C-[" = "normal_mode"
# Readline-style navigation
"C-a" = "goto_line_start"
"C-e" = "goto_line_end"
"C-f" = "move_char_right"
"C-b" = "move_char_left"
# Word movement
"A-f" = "move_next_word_end"
"A-b" = "move_prev_word_start"
# Line movement
"C-p" = "move_line_up"
"C-n" = "move_line_down"
# Deletion
"C-h" = "delete_char_backward"
"C-d" = "delete_char_forward"
"C-k" = "kill_to_line_end"
"C-u" = "kill_to_line_start"
"A-d" = "delete_word_forward"

[keys.select]
"C-[" = ["collapse_selection", "keep_primary_selection"]
