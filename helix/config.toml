theme = "vesper"

[editor]
line-number = "relative"
cursorline = true
bufferline = "multiple"
true-color = true
shell = ["zsh", "-c"]

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.statusline]
left = ["mode", "spacer", "version-control", "file-name", "file-modification-indicator"]
right = ["diagnostics", "selections", "register", "position"] 

[editor.indent-guides]
render = true

[keys.normal]
"C-h" = "jump_view_left"
"C-j" = "jump_view_down"
"C-k" = "jump_view_up"
"C-l" = "jump_view_right"
"C-S-h" = "swap_view_left"
"C-S-j" = "swap_view_down"
"C-S-k" = "swap_view_up"
"C-S-l" = "swap_view_right"

[keys.insert]
"C-[" = "normal_mode"

[keys.select]
"C-[" = "normal_mode"
