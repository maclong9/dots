[language-server.harper-ls]
command = "harper-ls"
args = ["--stdio"]

[[language]]
name = "css"
file-types = ["css"]
language-servers = ["tailwindcss-language-server"]
formatter = { command = "prettier", args = ["--parser", "css"] }
auto-format = true

[[language]]
name = "html"
file-types = ["html"]
formatter = { command = "prettier", args = ["--parser", "html"] }
auto-format = true

[[language]]
name = "markdown"
file-types = ["md"]
language-servers = ["harper-ls", "marksman"]
formatter = { command = "prettier", args = ["--parser", "markdown"] }
soft-wrap.enable = true

[[language]]
name = "svelte"
language-servers = [
  "harper-ls",
  "svelteserver",
  "tailwindcss-language-server",
  "emmet-ls",
  "vscode-eslint-language-server",
  "typescript-language-server"
  ]
file-types = ["svelte"]
formatter = { command = "prettier", args = ["--parser", "svelte"] }
auto-format = true

[[language]]
name = "swift"
file-types = ["swift"]
formatter = { command = "swift format", args = ["--in-place"] }
auto-format = true

[[language]]
name = "typescript"
file-types = ["js", "ts", "mjs", "mts", "cjs"]
language-servers = [
  "eslint-language-server",
  "harper-ls",
  "typescript-language-server",
]
formatter = { command = "prettier", args = ["--parser", "typescript"] }
auto-format = true

[[language]]
name = "tsx"
file-types = ["jsx", "tsx"]
language-servers = [
  "emmet-ls",
  "harper-ls",
  "tailwindcss-lannguage-server",
  "typescript-language-server",
  "vscode-eslint-language-server",
]
formatter = { command = "prettier", args = ["--parser", "typescript"] }
auto-format = true
soft-wrap.enable = true
